#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

exec-once = kdeconnect-indicator
exec-once = polkit-gnome-authentication-agent-1
exec-once = hyprctl setcursor Bibata-Modern-Classic 24
exec-once = qs -c noctalia-shell
exec-once = [workspace 2] sleep 3 && zeditor
exec-once = [workspace 3] sleep 3 && steam
exec-once = [workspace 4] sleep 2 && floorp
exec-once = [workspace 5] sleep 2 && kitty -e btop
exec-once = [workspace 6]
exec-once = [workspace 7] spotify
exec-once = [workspace 8] vesktop
exec-once = [workspace 9]
