# vim:fileencoding=utf-8:ft=conf:foldmethod=marker

# ==========================================
#  Fonts
# ==========================================
# font_family      monospace
# bold_font        auto
# italic_font      auto
# bold_italic_font auto
font_size        12.0

# ==========================================
#  Window Layout & Behavior
# ==========================================
window_padding_width 12
# Removes the title bar and window control buttons
hide_window_decorations yes
confirm_os_window_close 0
remember_window_size  yes
initial_window_width  960
initial_window_height 600

# ==========================================
#  Functionality & Mouse
# ==========================================
# History length (Scrollback buffer)
scrollback_lines 10000

# Hide mouse cursor after 3 seconds of typing
mouse_hide_wait 3.0

# Middle click to paste from selection (standard Linux behavior)
mouse_map middle release ungrabbed paste_from_selection

# ==========================================
#  Advanced / Shell
# ==========================================
# Automatically drop into Fish shell
shell fish

# ==========================================
#  Color Scheme & Cursor (Marchborn Guardian)
# ==========================================
# background            #151A1C
# foreground            #E1E8E6
# selection_background  #2A5A5C
# selection_foreground  #E1E8E6

# Cursor colors
# cursor                #FF4D4D
# cursor_text_color     #151A1C
cursor_shape          block
cursor_blink_interval 0.5

# Cursor Trail Animation
cursor_trail 1
cursor_trail_decay 0.1 0.4
cursor_trail_start_threshold 2

# URL underline color when hovering with mouse
# url_color             #4DB8FF

# The 16 terminal colors

# black
# color0 #151A1C
# color8 #2A5A5C

# red
# color1 #FF4D4D
# color9 #FF7373

# green
# color2  #2A5A5C
# color10 #4DB8FF

# yellow
# color3  #E5C07B
# color11 #E5D09B

# blue
# color4  #4DB8FF
# color12 #73C6FF

# magenta
# color5  #C678DD
# color13 #D698ED

# cyan
# color6  #56B6C2
# color14 #76C6D2

# white
# color7  #E1E8E6
# color15 #FFFFFF

