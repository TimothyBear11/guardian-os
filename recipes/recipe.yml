# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: guardian-os
description: The Final Guardian Workstation (SCX + ROCm + Ollama + Noctalia)
base-image: quay.io/fedora-ostree-desktops/cosmic-atomic
image-version: 44

modules:
  # STEP 1: Repo Configuration (RPM Fusion + Jailed Fallback Terra)
  - type: script
    snippets:
      - |
        set -ouex pipefail
        # Install RPM Fusion
        rpm-ostree install \
            https://download1.rpmfusion.org/free/fedora/rpmfusion-free-release-44.noarch.rpm \
            https://download1.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-44.noarch.rpm

        # Jail the Terra Repo (Using F43 as a fallback to bypass the F44 404)
        cat << 'EOF' > /etc/yum.repos.d/terra.repo
        [terra]
        name=Terra Fallback (F43)
        baseurl=https://repos.fyralabs.com/terra43/$basearch/
        enabled=1
        gpgcheck=0
        includepkgs=noctalia-qs,noctalia-shell,quickshell,scx-scheds,scx-tools
        EOF

        # Disable Rawhide repos to prevent version drift
        sed -i 's/enabled=1/enabled=0/' /etc/yum.repos.d/rpmfusion-free-rawhide.repo || true
        sed -i 's/enabled=1/enabled=0/' /etc/yum.repos.d/rpmfusion-nonfree-rawhide.repo || true

  # STEP 2: The Core Desktop & Compute Suite
  - type: rpm-ostree
    repos:
      - https://copr.fedorainfracloud.org/coprs/yalter/niri/repo/fedora-44/yalter-niri-fedora-44.repo
      - https://copr.fedorainfracloud.org/coprs/lionheartp/Hyprland/repo/fedora-44/lionheartp-Hyprland-fedora-44.repo
      - https://copr.fedorainfracloud.org/coprs/lilay/topgrade/repo/fedora-44/lilay-topgrade-fedora-44.repo
      - https://copr.fedorainfracloud.org/coprs/avengemedia/dms/repo/fedora-44/avengemedia-dms-fedora-44.repo
    install:
      # Desktop & Schedulers
      - plymouth-plugin-script
      - scx-scheds
      - scx-tools
      - niri
      - hyprland
      - qtile-wayland
      - dms
      - topgrade
      # ROCm Stack (For RX 6700 XT AI)
      - rocm-hip
      - rocm-opencl
      - rocm-runtime
      - rocm-smi
      - rocminfo
      - clinfo
      # System Tools
      - konsole
      - fish
      - neovim
      - emacs-nox
      - fastfetch
      - btop
      - nvtop
      # Steam & 32-bit Doodoo
      - steam
      - mesa-dri-drivers.i686
      - mesa-vulkan-drivers.i686
      - vulkan-loader.i686
      - glibc.i686
      - ibus-gtk2.i686

  # STEP 3: Automation & Customization
  - type: chezmoi
    repository: "https://github.com/timothybear11/ArtixDots"
    all-users: true

  - type: brew

  # STEP 4: Assets Mapping
  - type: files
    files:
      - source: system-fonts
        destination: /usr/share/fonts/guardian-fonts
      - source: etc/plymouth
        destination: /etc/plymouth
      - source: usr/share/plymouth/themes/guardian
        destination: /usr/share/plymouth/themes/guardian

  # STEP 5: Final Jails & Services
  - type: script
    snippets:
      # Sched-ext Service
      - |
        cat << 'EOF' > /etc/systemd/system/scx_rusty.service
        [Unit]
        Description=Sched-ext Rusty Scheduler
        After=multi-user.target
        [Service]
        Type=simple
        ExecStart=/usr/bin/scx_rusty
        Restart=always
        [Install]
        WantedBy=multi-user.target
        EOF
        systemctl disable scx_loader.service || true
        systemctl enable scx_rusty.service

      # Ollama Engine Setup
      - |
        curl -L https://ollama.com/download/ollama-linux-amd64.tar.gz | tar -xz -C /usr
        cat << 'EOF' > /etc/systemd/system/ollama.service
        [Unit]
        Description=Ollama Service
        After=network-online.target
        [Service]
        ExecStart=/usr/bin/ollama serve
        User=root
        Restart=always
        Environment="OLLAMA_HOST=0.0.0.0"
        [Install]
        WantedBy=multi-user.target
        EOF
        systemctl enable ollama.service

      # Noctalia Shell Jail
      - |
        mkdir -p /usr/lib/noctalia
        dnf download --destdir=/tmp -y noctalia-qs --arch=$(arch)
        rpm2cpio /tmp/noctalia-qs*.rpm | cpio -idmv -D /usr/lib/noctalia
        mkdir -p /usr/lib/noctalia/usr/share/quickshell/shells/noctalia
        curl -sL https://github.com/noctalia-dev/noctalia-shell/releases/latest/download/noctalia-latest.tar.gz | \
        tar -xz --strip-components=1 -C /usr/lib/noctalia/usr/share/quickshell/shells/noctalia
        # Create Wrapper
        cat << 'EOF' > /usr/bin/noctalia-qs
        #!/bin/bash
        export QML2_IMPORT_PATH=/usr/lib/noctalia/usr/lib64/qt6/qml:$QML2_IMPORT_PATH
        export QUICKSHELL_SHELL_PATH=/usr/lib/noctalia/usr/share/quickshell/shells
        if [[ "$*" == *"-c"* ]] || [[ "$*" == *"--config"* ]]; then
            exec /usr/lib/noctalia/usr/bin/qs "$@"
        else
            exec /usr/lib/noctalia/usr/bin/qs -c noctalia "$@"
        fi
        EOF
        chmod +x /usr/bin/noctalia-qs

  - type: os-release
    properties:
      NAME: Guardian OS
      ID: guardian
      PRETTY_NAME: Guardian OS (Atomic)

  - type: initramfs
