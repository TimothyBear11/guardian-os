---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: guardian-os
description: Atomic Qtile + COSMIC workstation
base-image: quay.io/fedora-ostree-desktops/cosmic-atomic
image-version: 43

modules:
  # STEP 1: Inject the RPM Fusion Repositories
  - type: rpm-ostree
    install:
      - https://mirrors.rpmfusion.org/free/fedora/rpmfusion-free-release-43.noarch.rpm
      - https://mirrors.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-43.noarch.rpm
      - https://github.com/terrapkg/subatomic-repos/releases/download/latest/terra.repo
      - https://copr.fedorainfracloud.org/coprs/bieszczaders/kernel-cachyos/repo/fedora-43/bieszczaders-kernel-cachyos-fedora-43.repo

  # STEP 1.5: The Kernel Swap (High Risk / High Reward!)
  - type: rpm-ostree
    install:
      - kernel-cachyos
      - kernel-cachyos-devel-matched
    # We use 'remove' to rip out the stock Fedora kernel simultaneously
    remove:
      - kernel
      - kernel-core
      - kernel-modules
      - kernel-modules-core
      - kernel-modules-extra

  # STEP 2: Install Homebrew (This acts as a "Layer Break" so Step 1 finishes completely)
  - type: brew

  # STEP 3: Install the Guardian power tools (Steam can now be safely found)
  - type: rpm-ostree
    install:
      - steam
      - gamescope
      - mangohud
      - gamemode
      - distrobox
      - qtile
      - qtile-extras
      - kitty
      - fish
      - neovim
      - kde-connect
      - rocm-opencl
      - rocm-hip 
      - rocminfo
      - zed
    remove:
      - firefox
      - firefox-langpacks

  # STEP 4: Inject your local Bloodstone assets
  - type: files
    files:
      - source: config               # Removed the "files/" prefix
        destination: /etc/skel/.config
        
      - source: system-fonts         # Removed the "files/" prefix
        destination: /etc/skel/.local/share/fonts
