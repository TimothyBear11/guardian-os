---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: guardian-os
description: Atomic Qtile + COSMIC workstation
base-image: quay.io/fedora-ostree-desktops/cosmic-atomic
image-version: 43

modules:
  # STEP 1: Inject the RPM Fusion Repositories (if you still need these)
  # ... your existing RPM Fusion steps ...

  # STEP 1.5: Enable the CachyOS kernel COPR (bieszczaders/kernel-cachyos)
  - type: copr 
    copr: bieszczaders/kernel-cachyos
    
  # STEP 2: The Kernel Swap
  - type: dnf
    install:
      allow-erasing: true
      install-weak-deps: false
      packages:
        - kernel-cachyos
        - kernel-cachyos-devel-matched
    remove:
      packages:
        - kernel
        - kernel-core
        - kernel-modules
        - kernel-modules-core
        - kernel-modules-extra

  # STEP 3: Install Homebrew (This acts as a "Layer Break" so Step 1 finishes completely)
  - type: brew

  # STEP 4: Install the Guardian power tools (Steam can now be safely found)
  - type: rpm-ostree
    install:
      - steam
      - gamescope
      - mangohud
      - gamemode
      - distrobox
      - qtile
      - qtile-extras
      - kitty
      - fish
      - neovim
      - kde-connect
      - rocm-opencl
      - rocm-hip 
      - rocminfo
      - zed
    remove:
      - firefox
      - firefox-langpacks

  # STEP 5: Inject your local Bloodstone assets
  - type: files
    files:
      - source: config               # Removed the "files/" prefix
        destination: /etc/skel/.config
        
      - source: system-fonts         # Removed the "files/" prefix
        destination: /etc/skel/.local/share/fonts
