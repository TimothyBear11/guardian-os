# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: guardian-os
description: The Centennial Guardian (Stable Kernel + SCX Gaming)
base-image: quay.io/fedora-ostree-desktops/cosmic-atomic
image-version: 44

modules:
  # STEP 1: Manual RPM Fusion via Primary Mirrors
  - type: script
    snippets:
      - |
        set -ouex pipefail
        rpm-ostree install \
            https://download1.rpmfusion.org/free/fedora/rpmfusion-free-release-44.noarch.rpm \
            https://download1.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-44.noarch.rpm
        sed -i 's/enabled=1/enabled=0/' /etc/yum.repos.d/rpmfusion-free-rawhide.repo || true
        sed -i 's/enabled=1/enabled=0/' /etc/yum.repos.d/rpmfusion-nonfree-rawhide.repo || true

  # STEP 2: The Core Desktop Suite (Fixing the 404)
  - type: rpm-ostree
    repos:
      - https://github.com/terrapkg/subatomic-repos/raw/main/terra.repo
      - https://copr.fedorainfracloud.org/coprs/yalter/niri/repo/fedora-%OS_VERSION%/yalter-niri-fedora-%OS_VERSION%.repo
      - https://copr.fedorainfracloud.org/coprs/lionheartp/Hyprland/repo/fedora-%OS_VERSION%/lionheartp-Hyprland-fedora-%OS_VERSION%.repo
      - https://copr.fedorainfracloud.org/coprs/lilay/topgrade/repo/fedora-%OS_VERSION%/lilay-topgrade-fedora-%OS_VERSION%.repo
      # FIXED: Points to the Addons repo where scx-scheds actually lives
      - https://copr.fedorainfracloud.org/coprs/bieszczaders/kernel-cachyos-addons/repo/fedora-%OS_VERSION%/bieszczaders-kernel-cachyos-addons-fedora-%OS_VERSION%.repo
    install:
      - plymouth-plugin-script
      - scx-scheds           # Sched-ext (BPF) schedulers
      - scx-tools            # Includes scxctl for management
      - mangowm
      - niri
      - hyprland
      - qtile-wayland
      - qtile-extras
      - noctalia-shell
      - topgrade
      - gamescope
      - mangohud
      - konsole              # KONSOLE ONLY - No Kitty!
      - fish
      - neovim
      - xdg-desktop-portal-hyprland
      - xdg-desktop-portal-gtk
      - jq
      - socat
      - polkit-kde

  # STEP 3: Chezmoi (Your configuration hub)
  - type: chezmoi
    repository: "https://github.com/timothybear11/dotfiles"
    all-users: true

  # STEP 4: Assets & Scheduler Config
  - type: files
    files:
      - source: system-fonts
        destination: /usr/share/fonts/guardian-fonts
      - source: etc/plymouth
        destination: /etc/plymouth
      - source: usr/share/plymouth/themes/guardian
        destination: /usr/share/plymouth/themes/guardian
      # Tells the systemd service to use scx_lavd for gaming performance
      - destination: /etc/default/scx
        contents: |
          SCX_SCHEDULER=scx_lavd

  # STEP 5: System Clean-up & Styling
  - type: script
    snippets:
      - "rm -f /usr/share/dbus-1/services/fr.emersion.mako.service"
      - "plymouth-set-default-theme guardian"

  # STEP 6: Rebrand & Enable Services
  - type: systemd
    system:
      enabled:
        - scx.service

  - type: os-release
    properties:
      NAME: Guardian OS
      ID: guardian_os
      VARIANT_ID: cosmic

  - type: initramfs
