# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: guardian-os
description: The Final Guardian Workstation (SCX Fixed + Konsole + Emacs)
base-image: quay.io/fedora-ostree-desktops/cosmic-atomic
image-version: 44

modules:
  # STEP 1: RPM Fusion Fix
  - type: script
    snippets:
      - |
        set -ouex pipefail
        rpm-ostree install \
            https://download1.rpmfusion.org/free/fedora/rpmfusion-free-release-44.noarch.rpm \
            https://download1.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-44.noarch.rpm
        sed -i 's/enabled=1/enabled=0/' /etc/yum.repos.d/rpmfusion-free-rawhide.repo || true
        sed -i 's/enabled=1/enabled=0/' /etc/yum.repos.d/rpmfusion-nonfree-rawhide.repo || true

  # STEP 2: The Core Desktop & Wizard Suite
  - type: rpm-ostree
    repos:
      - https://github.com/terrapkg/subatomic-repos/raw/main/terra.repo
      - https://copr.fedorainfracloud.org/coprs/yalter/niri/repo/fedora-44/yalter-niri-fedora-44.repo
      - https://copr.fedorainfracloud.org/coprs/lionheartp/Hyprland/repo/fedora-44/lionheartp-Hyprland-fedora-44.repo
      - https://copr.fedorainfracloud.org/coprs/lilay/topgrade/repo/fedora-44/lilay-topgrade-fedora-44.repo
      - https://copr.fedorainfracloud.org/coprs/bieszczaders/kernel-cachyos-addons/repo/fedora-44/bieszczaders-kernel-cachyos-addons-fedora-44.repo
    install:
      - plymouth-plugin-script
      - scx-scheds           
      - scx-tools            # Added for better management
      - mangowm
      - niri
      - hyprland
      - qtile-wayland
      - qtile-extras
      - noctalia-shell
      - topgrade
      - gamescope
      - mangohud
      - konsole              
      - fish
      - neovim
      - emacs-nox        
      - ripgrep          
      - fd-find          
      - git              
      - xdg-desktop-portal-hyprland
      - xdg-desktop-portal-gtk
      - jq
      - socat
      - polkit-kde

  # STEP 3: Chezmoi
  - type: chezmoi
    repository: "https://github.com/timothybear11/dotfiles"
    all-users: true

  # STEP 4: Assets Mapping
  - type: files
    files:
      - source: system-fonts
        destination: /usr/share/fonts/guardian-fonts
      - source: etc/plymouth
        destination: /etc/plymouth
      - source: usr/share/plymouth/themes/guardian
        destination: /usr/share/plymouth/themes/guardian

  # STEP 5: System Config & Service Enablement (The Fix)
  - type: script
    snippets:
      - "rm -f /usr/share/dbus-1/services/fr.emersion.mako.service"
      - "plymouth-set-default-theme guardian"
      - "mkdir -p /etc/default && echo 'SCX_SCHEDULER=scx_lavd' > /etc/default/scx"
      # Enable scx directly in the script to bypass the module failure
      - "systemctl enable scx.service"

  # STEP 6: Branding
  - type: os-release
    properties:
      NAME: Guardian OS
      ID: guardian_os
      VARIANT_ID: cosmic

  - type: initramfs
