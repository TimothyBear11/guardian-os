# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: guardian-os
description: Final Guardian Workstation (ROCm + Ollama + Terra Fallback)
base-image: ghcr.io/blue-build/base-images/fedora-kinoite
image-version: latest

modules:
  - type: custom-kernel
    source: local
    kernel: cachyos-bore-lto
    initramfs: true
    secrets:
      - type: env
        source: MOK_PRIV
        mount:
          type: file
          destination: /tmp/certs/MOK.priv
    sign:
      key: /tmp/certs/MOK.priv
      cert: MOK.pem # This is the public one in your repo root
      mok-password: guardian
  - type: dnf
    repos:
      nonfree: negativo17
      files:
        - https://github.com/terrapkg/subatomic-repos/raw/main/terra.repo
      copr:
        - yalter/niri
        - lionheartp/Hyprland
        - lilay/topgrade
        - avengemedia/dms
        - bieszczaders/kernel-cachyos
        - bieszczaders/kernel-cachyos-addons
    install:
      install-weak-deps: false
      packages:
        # Terra Repos
        - terra-release
        - terra-release-mesa
        - terra-release-multimedia
        # Gaming & GPU (RX 6700 XT)
        - steam
        - rocm-hip
        - rocm-opencl
        - rocm-runtime
        - rocm-smi
        - clinfo
        - nvtop
        # 32-bit
        - mesa-dri-drivers.i686
        - mesa-vulkan-drivers.i686
        - vulkan-loader.i686
        - glibc.i686
        - ibus-gtk2.i686
        # Performance & Desktop (Found via Terra F44 + COPR)
        - scx-scheds
        - scx-tools
        - niri
        - hyprland
        - hyprland-guiutils
        - qtile-wayland
        - qtile-extras
        - noctalia-shell
        - topgrade
        - mangowm
        # Den Essentials
        - fish
        - neovim
        - emacs-nox
        - fastfetch
        - btop
        - plymouth-plugin-script
        - xdg-desktop-portal
        - xdg-desktop-portal-hyprland
        - xdg-desktop-portal-gtk
        - xdg-desktop-portal-wlr
        - helix
        - gamescope
        - mangohud
        - ripgrep
        - fd-find
        - git
        - jq
        - socat
        - sqlite
        - playerctl
        - libnotify
        - network-manager-applet
        - distrobox
        - mpv
        - pciutils
        - kitty
        - gamemode
        - fftw
        - qt6-qtdeclarative
        - qt6-qtwayland
        - qt6-qt5compat
        - qt6-qtsvg
        - qt6-qtmultimedia
        - tmux
        - pipx
        - cpio
        - pkg-config
        - yt-dlp
        - python3-pip
        - brightnessctl
        - grim
        - slurp
        - ark
        - wget
        - konsole
        - kate
        - kanshi
        - swww

  - type: script
    snippets:
      - |
        set -euo pipefail
        cat << 'EOF' > /etc/systemd/system/scx_rusty.service
        [Unit]
        Description=Sched-ext Rusty Scheduler
        After=multi-user.target
        [Service]
        Type=simple
        ExecStart=/usr/bin/scx_rusty
        Restart=always
        [Install]
        WantedBy=multi-user.target
        EOF
        systemctl enable scx_rusty.service

      # Ollama Engine Setup
      - |
        set -euo pipefail
        curl -fsSL https://ollama.com/download/ollama-linux-amd64.tar.zst | tar --zstd -x -C /usr
        curl -fsSL https://ollama.com/download/ollama-linux-amd64-rocm.tar.zst | tar --zstd -x -C /usr
        cat << 'EOF' > /etc/systemd/system/ollama.service
        [Unit]
        Description=Ollama Service
        After=network-online.target
        [Service]
        ExecStart=/usr/bin/ollama serve
        User=root
        Restart=always
        Environment="OLLAMA_HOST=0.0.0.0"
        Environment="HSA_OVERRIDE_GFX_VERSION=10.3.0"
        Environment="OLLAMA_MAX_LOADED_MODELS=2"
        [Install]
        WantedBy=multi-user.target
        EOF
        systemctl enable ollama.service

  # STEP 3: Configuration & Dots
  - type: chezmoi
    repository: "https://github.com/timothybear11/ArtixDots"
    all-users: true

  - type: brew

  # STEP: Assets Mapping (Fonts & Plymouth)
  - type: files
    files:
      - source: system-fonts
        destination: /usr/share/fonts/guardian-fonts
      - source: etc/plymouth
        destination: /etc/plymouth
      - source: usr/share/plymouth/themes/guardian
        destination: /usr/share/plymouth/themes/guardian

  # STEP: System Clean-up (Notification Daemon Conflict Resolution)
  - type: script
    snippets:
      - "plymouth-set-default-theme guardian"

  # STEP 4: Branding
  - type: os-release
    properties:
      NAME: Guardian OS
      PRETTY_NAME: Guardian OS (Atomic)

  - type: initramfs
