# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: guardian-os
description: Atomic Qtile + COSMIC workstation
base-image: quay.io/fedora-ostree-desktops/cosmic-atomic
image-version: 43

modules:
  # STEP 1: Bling (Cleanly automates adding RPMFusion free and nonfree)
  - type: bling
    install:
      - rpmfusion

  # STEP 2: Install Homebrew (Acts as a layer break)
  - type: brew

  # STEP 3: Base OS Packages (Wayland WM environment & Tools)
  - type: rpm-ostree
    repos:
      - https://github.com/terrapkg/subatomic-repos/raw/main/terra.repo
      - https://copr.fedorainfracloud.org/coprs/yalter/niri/repo/fedora-%OS_VERSION%/yalter-niri-fedora-%OS_VERSION%.repo
    install:
      - gamescope
      - mangohud
      - gamemode
      - distrobox
      - kitty
      - fish
      - neovim
      - kde-connect
      - rocm-opencl
      - rocm-hip 
      - rocminfo
      - zed
      - polkit-kde
      # Noctalia and Niri 
      - niri
      - xwayland-satellite
      - noctalia-shell
      - ddcutil
      - wlsunset
      - cava 
      - cliphist
      # Qtile 
      - qtile-wayland
      - qtile-extras
      - fuzzel
      - swww
      - kanshi
      - network-manager-applet
    remove:
      - firefox
      - firefox-langpacks

  # STEP 4.1: UUPD via COPR
  - type: dnf
    repos:
      copr:
        - ublue-os/packages
    install:
      packages:
        - uupd

  # STEP 4.2: Steam via Negativo17 
  - type: dnf
    #install-weak-deps: false
    repos:
      files:
        - https://negativo17.org/repos/fedora-steam.repo
    install:
      packages:
        - steam
        - kernel-modules-extra
        

  # STEP 5: System Fonts
  - type: fonts
    fonts:
      nerd-fonts:
        - FiraCode
        - JetBrainsMono
        - Hack
      google-fonts:
        - Roboto
        - Open Sans

  # STEP 6: Inject Local Assets
  - type: files
    files:
      - source: config
        destination: /etc/skel/.config
      - source: system-fonts
        destination: /etc/skel/.local/share/fonts
