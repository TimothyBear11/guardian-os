# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: guardian-os
description: Final Guardian Workstation (ROCm + Ollama + Terra Fallback)
base-image: registry.fedoraproject.org/fedora-kinoite
image-version: 44

modules:
  - type: files
    files:
      - source: system
        destination: /
  - type: dnf
    install:
      packages:
        - sbsigntools

  - type: custom-kernel
    source: local
    kernel: cachyos-lto
    initramfs: true
    secrets:
      - type: env
        name: MOK_PRIV # This matches what is in your .github/workflows/build.yml
        mount:
          type: file
          destination: /tmp/certs/MOK.priv
    sign:
      key: /tmp/certs/MOK.priv
      cert: /tmp/modules/custom-kernel/MOK.pem
      mok-password: guardian
  - type: dnf
    repos:
      nonfree: negativo17
      files:
        - https://negativo17.org/repos/fedora-steam.repo
        - https://github.com/terrapkg/subatomic-repos/raw/main/terra.repo
      copr:
        - yalter/niri
        - lionheartp/Hyprland
        - lilay/topgrade
        - ublue-os/packages
        #  - bluebuild/bluebuild
        - avengemedia/dms
        - bieszczaders/kernel-cachyos
        - bieszczaders/kernel-cachyos-addons
    install:
      install-weak-deps: false
      packages:
        # Terra Repos
        - terra-release
        - terra-release-mesa
        - terra-release-multimedia
        # Gaming & GPU (RX 6700 XT)
        - steam
        - rocm-hip
        - rocm-opencl
        - rocm-runtime
        - rocm-smi
        - clinfo
        - nvtop
        # 32-bit
        - mesa-dri-drivers.i686
        - mesa-vulkan-drivers.i686
        - vulkan-loader.i686
        - glibc.i686
        - ibus-gtk2.i686
        # Performance
        - scx-scheds
        - scx-tools
        # Bluebuild
        - uupd
        #    - bluebuild
        - ublue-os-just
        - ublue-os-udev-rules
        - ublue-os-media-automount-udev
        # Window Managers
        - niri
        - hyprland
        - hyprland-guiutils
        - qtile-wayland
        - qtile-extras
        - noctalia-shell
        - topgrade
        - mangowm
        # Den Essentials
        - fish
        - neovim
        - emacs-nox
        - fastfetch
        - btop
        - plymouth-plugin-script
        - xdg-desktop-portal
        - xdg-desktop-portal-hyprland
        - xdg-desktop-portal-gtk
        - xdg-desktop-portal-wlr
        - helix
        - gamescope
        - mangohud
        - ripgrep
        - fd-find
        - git
        - jq
        - socat
        - sqlite
        - playerctl
        - libnotify
        - network-manager-applet
        - distrobox
        - mpv
        - pciutils
        - kitty
        - gamemode
        - fftw
        - qt6-qtdeclarative
        - qt6-qtwayland
        - qt6-qt5compat
        - qt6-qtsvg
        - qt6-qtmultimedia
        - tmux
        - pipx
        - cpio
        - pkg-config
        - yt-dlp
        - python3-pip
        - brightnessctl
        - grim
        - slurp
        - ark
        - wget
        - konsole
        - kate
        - kanshi
        - swww
    remove:
      auto-remove: true
      packages:
        - firefox
        - firefox-langpacks
        - gnome-system-monitor
        - toolbox
        - google-noto-color-emoji-fonts
        - gnome-disk-utility
        - waybar
        - yelp
        - kmines
        - kpat
        - elisa-player
        - skanpage
        - fedora-chromium-config-kde
        - fedora-chromium-config
        - fedora-bookmarks
        - cups
        - sane-backends
        - hplip
        # Accessibility (The "Speech" Bloat)
        - brltty
        - orca
        - speech-dispatcher
        # Virtualization (Bare Metal don't need these)
        - open-vm-tools
        - qemu-guest-agent
        - hyperv-daemons
        - spice-vdagent
        - khelpcenter
        # Modem services
        - ModemManager
        - qcom-wwan-firmware
        - espeak-ng
        - braille-printer-app

  - type: script
    snippets:
      - |
        set -euo pipefail
        cat << 'EOF' > /etc/systemd/system/scx_rusty.service
        [Unit]
        Description=Sched-ext Rusty Scheduler
        After=multi-user.target
        [Service]
        Type=simple
        ExecStart=/usr/bin/scx_rusty
        Restart=always
        [Install]
        WantedBy=multi-user.target
        EOF
        systemctl enable scx_rusty.service

      # Ollama Engine Setup
      - |
        set -euo pipefail
        curl -fsSL https://ollama.com/download/ollama-linux-amd64.tar.zst | tar --zstd -x -C /usr
        curl -fsSL https://ollama.com/download/ollama-linux-amd64-rocm.tar.zst | tar --zstd -x -C /usr
        cat << 'EOF' > /etc/systemd/system/ollama.service
        [Unit]
        Description=Ollama Service
        After=network-online.target
        [Service]
        ExecStart=/usr/bin/ollama serve
        User=root
        Restart=always
        Environment="OLLAMA_HOST=0.0.0.0"
        Environment="HSA_OVERRIDE_GFX_VERSION=10.3.0"
        Environment="OLLAMA_MAX_LOADED_MODELS=2"
        [Install]
        WantedBy=multi-user.target
        EOF
        systemctl enable ollama.service

  # STEP 3: Configuration & Dots
  - type: chezmoi
    repository: "https://github.com/timothybear11/ArtixDots"
    all-users: true

  - type: brew

  # STEP: Assets Mapping (Fonts & Plymouth)
  - type: files
    files:
      - source: system-fonts
        destination: /usr/share/fonts/guardian-fonts
      - source: etc/plymouth
        destination: /etc/plymouth
      - source: usr/share/plymouth/themes/guardian
        destination: /usr/share/plymouth/themes/guardian

  - type: fonts
    fonts:
      url-fonts:
        - name: NotoColorEmoji
          url: https://github.com/googlefonts/noto-emoji/raw/main/fonts/NotoColorEmoji.ttf
      nerd-fonts:
        - FiraCode
        - JetBrainsMono
        - NerdFontsSymbolsOnly
      google-fonts:
        - Acme # Moved here for better management
        - Exo 2 # Great for a technical brand aesthetic
        - Orbitron # Matches a sharp, "guardian" look

  - type: default-flatpaks
    configurations:
      - scope: user
        repo:
          # you can override the title to make inclusion of both system and user repos clearer
          title: Flathub (user)
      - notify: false
        scope: system
        repo:
          title: Flathub (system)
        install:
          - com.github.tchx84.Flatseal
          - io.github.flattool.Warehouse
          - io.missioncenter.MissionCenter

  # STEP: System Clean-up (Notification Daemon Conflict Resolution)
  - type: script
    snippets:
      - "plymouth-set-default-theme guardian"
      - |
        if [ -f /etc/rpm-ostreed.conf ]; then
          sed -i 's/AutomaticUpdatePolicy=stage/AutomaticUpdatePolicy=none/g' /etc/rpm-ostreed.conf
        fi

      - |
        echo "Pruning extra kernels..."
        KERNEL_VERSION=$(rpm -q kernel-cachyos-lto --queryformat '%{VERSION}-%{RELEASE}.%{ARCH}')
        find /usr/lib/modules -maxdepth 1 -mindepth 1 -not -name "$KERNEL_VERSION" -exec rm -rf {} +
        echo "Pruning complete. Only $KERNEL_VERSION remains."

  - type: systemd
    system:
      enabled:
        - uupd.timer # Keep the system updated
      disabled:
        - dnf-makecache.timer # We use uupd, so we don't need dnf's background noise

  # STEP 4: Branding
  - type: os-release
    properties:
      NAME: Guardian OS
      PRETTY_NAME: Guardian OS (Atomic)

  - type: signing
  - type: initramfs
