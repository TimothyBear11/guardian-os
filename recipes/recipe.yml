# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: guardian-os
description: Final Guardian Workstation (ROCm + Ollama + Terra Fallback)
base-image: quay.io/fedora-ostree-desktops/cosmic-atomic
image-version: 44

modules:
  - type: script
    snippets:
      # Install RPMFusion repos first (must be before dnf tries to use them)
      - |
        set -euo pipefail
        echo "Installing RPMFusion repositories..."
        dnf install -y https://mirrors.rpmfusion.org/free/fedora/rpmfusion-free-release-44.noarch.rpm
        dnf install -y https://mirrors.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-44.noarch.rpm
        echo "RPMFusion repositories installed"
  # STEP 1: Repository Configuration (Fixed)
  - type: dnf
    repos:
      files:
        # Use only .repo files, not .rpm installers
        - https://negativo17.org/repos/fedora-steam.repo
      copr:
        - yalter/niri
        - lionheartp/Hyprland
        - lilay/topgrade
        - avengemedia/dms
        - bieszczaders/kernel-cachyos
        - bieszczaders/kernel-cachyos-addons
    install:
      install-weak-deps: false
      packages:
        # RPMFusion repos (enables free & nonfree packages)
        - rpmfusion-free-release
        - rpmfusion-nonfree-release
        # Gaming & GPU (RX 6700 XT)
        - steam
        - rocm-hip
        - rocm-opencl
        - rocm-runtime
        - rocm-smi
        - clinfo
        - nvtop
        # 32-bit Doodoo
        - mesa-dri-drivers.i686
        - mesa-vulkan-drivers.i686
        - vulkan-loader.i686
        - glibc.i686
        - ibus-gtk2.i686
        # Performance & Desktop (Found via Terra F44 + COPR)
        - niri
        - hyprland
        - hyprland-guiutils
        - qtile-wayland
        - scx-scheds
        - scx-tools
        - dms
        - topgrade
        # Den Essentials
        - fish
        - neovim
        - emacs-nox
        - fastfetch
        - btop
        - plymouth-plugin-script
        - konsole
        - dolphin
        # Got Lost
        - xdg-desktop-portal
        - xdg-desktop-portal-hyprland
        - xdg-desktop-portal-gtk
        - qtile-extras
        - gamescope
        - mangohud
        - ripgrep
        - fd-find
        - git
        - jq
        - socat
        - polkit-kde
        - sqlite
        - playerctl
        - libnotify
        - network-manager-applet
        - distrobox
        - mpv
        - pciutils
        - mangowm
        - kitty
        - gamemode

  # STEP 2: Terra Repository & System Services
  - type: script
    snippets:
      # Install Terra repository (required for noctalia)
      - |
        set -euo pipefail
        echo "Installing Terra repository..."
        curl -fsSL https://github.com/terrapkg/subatomic-repos/raw/main/terra.repo | tee /etc/yum.repos.d/terra.repo
        dnf install -y terra-release
        echo "Terra repository installed successfully"

      # Sched-ext: Rusty 5800X Optimization
      - |
        set -euo pipefail
        cat << 'EOF' > /etc/systemd/system/scx_rusty.service
        [Unit]
        Description=Sched-ext Rusty Scheduler
        After=multi-user.target
        [Service]
        Type=simple
        ExecStart=/usr/bin/scx_rusty
        Restart=always
        [Install]
        WantedBy=multi-user.target
        EOF
        systemctl enable scx_rusty.service

      # Ollama Engine Setup
      - |
        set -euo pipefail
        curl -fsSL https://ollama.com/download/ollama-linux-amd64.tar.zst | tar --zstd -x -C /usr
        cat << 'EOF' > /etc/systemd/system/ollama.service
        [Unit]
        Description=Ollama Service
        After=network-online.target
        [Service]
        ExecStart=/usr/bin/ollama serve
        User=root
        Restart=always
        Environment="OLLAMA_HOST=0.0.0.0"
        [Install]
        WantedBy=multi-user.target
        EOF
        systemctl enable ollama.service

      # Unified Noctalia + DMS Setup (noctalia-qs as default for both)
      - |
        set -euo pipefail
        trap 'echo "Error during noctalia setup" >&2' ERR

        # Create noctalia jail structure
        mkdir -p /usr/lib/noctalia/usr/share/quickshell/shells/noctalia

        # Download and extract noctalia-qs package
        echo "Downloading noctalia-qs..."
        dnf download --destdir=/tmp -y noctalia-qs --arch=$(arch) 2>/dev/null || {
          echo "Warning: Could not download noctalia-qs via dnf, attempting direct download..."
        }

        if [ -f /tmp/noctalia-qs*.rpm ]; then
          echo "Extracting noctalia-qs..."
          rpm2cpio /tmp/noctalia-qs*.rpm | cpio -idmv -D /usr/lib/noctalia 2>/dev/null
          rm -f /tmp/noctalia-qs*.rpm
        fi

        # Download noctalia shell release
        echo "Downloading noctalia-shell..."
        NOCTALIA_RELEASE=$(curl -fsSL https://api.github.com/repos/noctalia-dev/noctalia-shell/releases/latest | grep -oP '"tag_name": "\K[^"]+' || echo "latest")
        NOCTALIA_URL="https://github.com/noctalia-dev/noctalia-shell/releases/download/${NOCTALIA_RELEASE}/noctalia-${NOCTALIA_RELEASE}.tar.gz"

        if curl -fsSL "$NOCTALIA_URL" | tar -xz --strip-components=1 -C /usr/lib/noctalia/usr/share/quickshell/shells/noctalia 2>/dev/null; then
          echo "Successfully installed noctalia-shell"
        else
          echo "Warning: Failed to download noctalia-shell from releases, using latest available"
          curl -fsSL https://github.com/noctalia-dev/noctalia-shell/releases/latest/download/noctalia-latest.tar.gz | \
            tar -xz --strip-components=1 -C /usr/lib/noctalia/usr/share/quickshell/shells/noctalia || {
            echo "Error: Could not download noctalia-shell"
            exit 1
          }
        fi

        # Create noctalia-qs wrapper script
        cat << 'WRAPPER' > /usr/bin/noctalia-qs
        #!/bin/bash
        # Noctalia QuickShell wrapper - used by both noctalia and dms
        export QML2_IMPORT_PATH="/usr/lib/noctalia/usr/lib64/qt6/qml:${QML2_IMPORT_PATH:-}"
        TARGET_PATH="/usr/lib/noctalia/usr/share/quickshell/shells/noctalia"

        has_target=0
        args=()

        while [[ $# -gt 0 ]]; do
            case "$1" in
                -c|--config)
                    has_target=1
                    # Intercept noctalia calls and reroute to absolute path
                    if [[ "$2" == "noctalia" || "$2" == "noctalia-shell" ]]; then
                        args+=("-p" "$TARGET_PATH")
                        shift 2
                    else
                        args+=("$1" "$2")
                        shift 2
                    fi
                    ;;
                -p|--path)
                    has_target=1
                    args+=("$1" "$2")
                    shift 2
                    ;;
                *)
                    args+=("$1")
                    shift 1
                    ;;
            esac
        done

        # Default to noctalia if no specific config/path is requested
        if [[ $has_target -eq 0 ]]; then
            args+=("-p" "$TARGET_PATH")
        fi

        exec /usr/lib/noctalia/usr/bin/qs "${args[@]}"
        WRAPPER
        chmod +x /usr/bin/noctalia-qs

        # Create symlink for DMS compatibility (if not already present)
        if command -v qs >/dev/null 2>&1; then
          echo "QuickShell already available at $(command -v qs)"
        else
          ln -sf /usr/bin/noctalia-qs /usr/bin/qs
          echo "Created symlink: /usr/bin/qs -> /usr/bin/noctalia-qs"
        fi

        echo "Noctalia setup complete. DMS will use noctalia-qs by default."

        # Cleanup
        rm -rf /tmp/noctalia* /tmp/*.rpm 2>/dev/null || true

  # STEP 3: Configuration & Dots
  - type: chezmoi
    repository: "https://github.com/timothybear11/ArtixDots"
    all-users: true

  - type: brew

  # STEP: Assets Mapping (Fonts & Plymouth)
  - type: files
    files:
      - source: system-fonts
        destination: /usr/share/fonts/guardian-fonts
      - source: etc/plymouth
        destination: /etc/plymouth
      - source: usr/share/plymouth/themes/guardian
        destination: /usr/share/plymouth/themes/guardian

  # STEP: System Clean-up (Notification Daemon Conflict Resolution)
  - type: script
    snippets:
      - "rm -f /usr/share/dbus-1/services/fr.emersion.mako.service"
      - "plymouth-set-default-theme guardian"

  # STEP 4: Branding
  - type: os-release
    properties:
      NAME: Guardian OS
      PRETTY_NAME: Guardian OS (Atomic)

  - type: initramfs
