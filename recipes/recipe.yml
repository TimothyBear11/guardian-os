# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: guardian-os
description: The Final Guardian Workstation (SCX Hard-Fix + Emacs)
base-image: quay.io/fedora-ostree-desktops/cosmic-atomic
image-version: 44

modules:
  # STEP 1: RPM Fusion Fix
  - type: script
    snippets:
      - |
        set -ouex pipefail
        rpm-ostree install \
            https://download1.rpmfusion.org/free/fedora/rpmfusion-free-release-44.noarch.rpm \
            https://download1.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-44.noarch.rpm
        sed -i 's/enabled=1/enabled=0/' /etc/yum.repos.d/rpmfusion-free-rawhide.repo || true
        sed -i 's/enabled=1/enabled=0/' /etc/yum.repos.d/rpmfusion-nonfree-rawhide.repo || true

  # STEP 2: The Core Desktop & Wizard Suite
  - type: rpm-ostree
    repos:
      - https://github.com/terrapkg/subatomic-repos/raw/main/terra.repo
      - https://copr.fedorainfracloud.org/coprs/yalter/niri/repo/fedora-44/yalter-niri-fedora-44.repo
      - https://copr.fedorainfracloud.org/coprs/lionheartp/Hyprland/repo/fedora-44/lionheartp-Hyprland-fedora-44.repo
      - https://copr.fedorainfracloud.org/coprs/lilay/topgrade/repo/fedora-44/lilay-topgrade-fedora-44.repo
      - https://copr.fedorainfracloud.org/coprs/avengemedia/dms/repo/fedora-44/avengemedia-dms-fedora-44.repo
    install:
      - plymouth-plugin-script
      - scx-scheds
      - scx-tools
      - mangowm
      - niri
      - hyprland
      - hyprland-guiutils
      - qtile-wayland
      - qtile-extras
      - dms
      - topgrade
      - gamescope
      - mangohud
      - konsole
      - fish
      - neovim
      - emacs-nox
      - ripgrep
      - fd-find
      - git
      - xdg-desktop-portal
      - xdg-desktop-portal-hyprland
      - xdg-desktop-portal-gtk
      - jq
      - socat
      - polkit-kde
      - sqlite
      - playerctl
      - libnotify
      - network-manager-applet
      - distrobox
      - mpv
      - fastfetch
      - pciutils
      - tmux
      - cmake
      - gcc-c++
      - cpio
      - pkgconf-pkg-config
      - btop

  # STEP 3: Chezmoi and homebrew
  - type: chezmoi
    repository: "https://github.com/timothybear11/ArtixDots"
    all-users: true

  - type: brew

  # STEP 4: Assets Mapping
  - type: files
    files:
      - source: system-fonts
        destination: /usr/share/fonts/guardian-fonts
      - source: etc/plymouth
        destination: /etc/plymouth
      - source: usr/share/plymouth/themes/guardian
        destination: /usr/share/plymouth/themes/guardian

  # STEP 5: System Config & Service Fix
  - type: script
    snippets:
      - "rm -f /usr/share/dbus-1/services/fr.emersion.mako.service"
      - "plymouth-set-default-theme guardian"
      - "ln -sf /lib/modules/$(uname -r)/config /boot/config-$(uname -r)"
      # Create the direct Rusty service
      - |
        cat << 'EOF' > /etc/systemd/system/scx_rusty.service
        [Unit]
        Description=Sched-ext Rusty Scheduler
        After=multi-user.target

        [Service]
        Type=simple
        ExecStart=/usr/bin/scx_rusty
        Restart=always

        [Install]
        WantedBy=multi-user.target
        EOF
      # Cleanup the loader and enable the worker
      - "systemctl disable scx_loader.service || true"
      - "systemctl enable scx_rusty.service"

  - type: script
    snippets:
      - |
        # Enable DMS specifically for the Niri session globally
        mkdir -p /usr/lib/systemd/user/niri.service.wants
        ln -s /usr/lib/systemd/user/dms.service /usr/lib/systemd/user/niri.service.wants/dms.service

  - type: script
    snippets:
      - |
        # 1. Prepare Jail
        mkdir -p /usr/lib/noctalia
        rm -rf /usr/lib/noctalia/*
        cd /tmp

        # 2. Get the ENGINE from Terra (Stable)
        curl -fsSL https://github.com/terrapkg/subatomic-repos/raw/main/terra.repo -o /etc/yum.repos.d/terra.repo
        dnf download -y noctalia-qs --arch=$(arch) --releasever=44
        rpm2cpio noctalia-qs*.rpm | cpio -idmv -D /usr/lib/noctalia

        # 3. Get the SHELL from GitHub (Bleeding Edge)
        # We put it in the same share folder the engine expects
        mkdir -p /usr/lib/noctalia/usr/share/quickshell/shells/noctalia
        curl -sL https://github.com/noctalia-dev/noctalia-shell/releases/latest/download/noctalia-latest.tar.gz | \
        tar -xz --strip-components=1 -C /usr/lib/noctalia/usr/share/quickshell/shells/noctalia

        # 4. The Wrapper (Absolute Path)
        cat << 'EOF' > /usr/bin/noctalia-qs
        #!/bin/bash
        export QML2_IMPORT_PATH=/usr/lib/noctalia/usr/lib64/qt6/qml:$QML2_IMPORT_PATH
        if [[ "$*" == *"-c"* ]] || [[ "$*" == *"--config"* ]]; then
            exec /usr/lib/noctalia/usr/bin/qs "$@"
        else
            exec /usr/lib/noctalia/usr/bin/qs -c /usr/lib/noctalia/usr/share/quickshell/shells/noctalia/shell.qml "$@"
        fi
        EOF
        chmod +x /usr/bin/noctalia-qs

  # STEP 6: Branding
  - type: os-release
    properties:
      NAME: Guardian OS
      ID: guardian
      ID_LIKE: fedora
      PRETTY_NAME: Guardian OS (Atomic)
      VARIANT: Guardian Edition
      VARIANT_ID: cosmic
      HOME_URL: "https://github.com/timothybear11/guardian-os"

  - type: initramfs
