# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: guardian-os
description: The Final Guardian Workstation (Qtile, Niri, Hypr, MangoWM)
base-image: quay.io/fedora-ostree-desktops/cosmic-atomic
image-version: 44

modules:
  # STEP 1: Manual RPM Fusion (No external script file needed)
  - type: script
    snippets:
      - |
        set -ouex pipefail
        rpm-ostree install \
            https://mirrors.rpmfusion.org/free/fedora/rpmfusion-free-release-44.noarch.rpm \
            https://mirrors.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-44.noarch.rpm
        # Ensure rawhide stays off and stable stays on
        sed -i 's/enabled=1/enabled=0/' /etc/yum.repos.d/rpmfusion-free-rawhide.repo || true
        sed -i 's/enabled=1/enabled=0/' /etc/yum.repos.d/rpmfusion-nonfree-rawhide.repo || true

  # STEP 2: The Core Desktop Suite (With Dependency Fix)
  - type: rpm-ostree
    repos:
      - https://github.com/terrapkg/subatomic-repos/raw/main/terra.repo
      - https://copr.fedorainfracloud.org/coprs/yalter/niri/repo/fedora-44/yalter-niri-fedora-44.repo
      - https://copr.fedorainfracloud.org/coprs/solopasha/hyprland/repo/fedora-44/solopasha-hyprland-fedora-44.repo
      - https://copr.fedorainfracloud.org/coprs/lilay/topgrade/repo/fedora-44/lilay-topgrade-fedora-44.repo
    install:
      # Explicitly add the missing base library
      - libdisplay-info
      # THE COMPOSITORS
      - mangowm
      - niri
      - hyprland
      - qtile-wayland
      - qtile-extras
      - noctalia-shell
      # TOOLS
      - topgrade
      - gamescope
      - mangohud
      - gamemode
      - kitty
      - fish
      - neovim
      - xdg-desktop-portal-hyprland
      - xdg-desktop-portal-gtk
      - jq
      - socat
      - polkit-kde

  # STEP 3: Chezmoi
  - type: chezmoi
    repository: "https://github.com/timothybear11/dotfiles"
    all-users: true

  # STEP 4: Styling & Customization
  - type: script
    snippets:
      - "curl -fsSL https://install.danklinux.com | sh"
      - "rm -f /usr/share/dbus-1/services/fr.emersion.mako.service"
      - "plymouth-set-default-theme guardian"

  # STEP 5: Assets Mapping
  - type: files
    files:
      - source: system-fonts
        destination: /usr/share/fonts/guardian-fonts
      - source: etc/plymouth
        destination: /etc/plymouth
      - source: usr/share/plymouth/themes/guardian
        destination: /usr/share/plymouth/themes/guardian

  # STEP 6: Rebrand & Rebuild
  - type: os-release
    properties:
      NAME: Guardian OS
      ID: guardian_os
      VARIANT_ID: cosmic

  - type: initramfs
