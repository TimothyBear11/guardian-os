# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: guardian-os
description: The Centennial Guardian (CachyOS Kernel + SCX)
base-image: quay.io/fedora-ostree-desktops/cosmic-atomic
image-version: 44

modules:
  # STEP 0: CachyOS Kernel Swap
  - type: rpm-ostree
    repos:
      - https://copr.fedorainfracloud.org/coprs/bieszczaders/kernel-cachyos/repo/fedora-44/bieszczaders-kernel-cachyos-fedora-44.repo
    # This section handles the swap
    remove:
      - kernel
      - kernel-core
      - kernel-modules
      - kernel-modules-core
      - kernel-modules-extra
    install:
      - kernel-cachyos
      - kernel-cachyos-devel # Useful for future akmods
    # The fix you found!
    flags:
      - "--allow-erasing"

  # STEP 1: Manual RPM Fusion via Primary Mirrors
  - type: script
    snippets:
      - |
        set -ouex pipefail
        rpm-ostree install \
            https://download1.rpmfusion.org/free/fedora/rpmfusion-free-release-44.noarch.rpm \
            https://download1.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-44.noarch.rpm
        sed -i 's/enabled=1/enabled=0/' /etc/yum.repos.d/rpmfusion-free-rawhide.repo || true
        sed -i 's/enabled=1/enabled=0/' /etc/yum.repos.d/rpmfusion-nonfree-rawhide.repo || true

  # STEP 2: The Core Desktop Suite
  - type: rpm-ostree
    repos:
      - https://github.com/terrapkg/subatomic-repos/raw/main/terra.repo
      - https://copr.fedorainfracloud.org/coprs/yalter/niri/repo/fedora-44/yalter-niri-fedora-44.repo
      - https://copr.fedorainfracloud.org/coprs/lionheartp/Hyprland/repo/fedora-44/lionheartp-Hyprland-fedora-44.repo
      - https://copr.fedorainfracloud.org/coprs/lilay/topgrade/repo/fedora-44/lilay-topgrade-fedora-44.repo
      - https://copr.fedorainfracloud.org/coprs/bieszczaders/scx/repo/fedora-44/bieszczaders-scx-fedora-44.repo
    install:
      - plymouth-plugin-script
      - scx-scheds
      - niri
      - hyprland
      - qtile-wayland
      - qtile-extras
      - noctalia-shell
      - mangowm
      - topgrade
      - kitty
      - fish
      - neovim
      - xdg-desktop-portal-hyprland
      - xdg-desktop-portal-gtk
      - jq
      - socat
      - polkit-kde

  # STEP 3: Chezmoi
  - type: chezmoi
    repository: "https://github.com/timothybear11/dotfiles"
    all-users: true

  # STEP 4: Assets & Configs (Files FIRST)
  - type: files
    files:
      - source: system-fonts
        destination: /usr/share/fonts/guardian-fonts
      - source: etc/plymouth
        destination: /etc/plymouth
      - source: usr/share/plymouth/themes/guardian
        destination: /usr/share/plymouth/themes/guardian
      - destination: /etc/default/scx
        contents: |
          SCX_SCHEDULER=scx_lavd

  # STEP 5: System Clean-up & Styling
  - type: script
    snippets:
      - "rm -f /usr/share/dbus-1/services/fr.emersion.mako.service"
      - "plymouth-set-default-theme guardian"

  # STEP 6: Rebrand & Enable Services
  - type: systemd
    system:
      enabled:
        - scx.service

  - type: os-release
    properties:
      NAME: Guardian OS
      ID: guardian_os
      VARIANT_ID: cosmic

  - type: initramfs # CRITICAL: Rebuilds the boot image for the new kernel
